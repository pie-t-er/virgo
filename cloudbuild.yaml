steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/virgo", "."]
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/virgo"]
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - virgo
      - --image=gcr.io/$PROJECT_ID/virgo
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --set-env-vars=GOOGLE_API_KEY=$_GOOGLE_API_KEY,MONGODB_URI=$_MONGODB_URI,MONGODB_DATABASE=wardrobe,GOOGLE_CLOUD_PROJECT=$PROJECT_ID

images:
  - "gcr.io/$PROJECT_ID/virgo"
